        <script src="script.js" type="text/javascript"></script>
        <script type="module" src="chat.js"></script>
        <script>
            async function addToHallOfFame(src) {
                const metaRes = await fetch(
                    `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/halloffame.json`,
                    {
                        headers: {
                            Authorization: `token ${GITHUB_TOKEN}`,
                        },
                    }
                );
                const metaFile = await metaRes.json();
                const current = JSON.parse(atob(metaFile.content));
                if (current.drawings.includes(src)) {
                    alert("Already in the Hall of Fame!");
                    return;
                }
                current.drawings.push(src);
                await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/halloffame.json`, {
                    method: "PUT",
                    headers: {
                        Authorization: `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        message: "Updated Hall of Fame",
                        content: btoa(JSON.stringify(current)),
                        sha: metaFile.sha,
                    }),
                });
                alert("⭐ Added to Hall of Fame!");
            }

            const swatches = [
                "#c0392b",
                "#d17a8c",
                "#ffd1dc",
                "#d35400",
                "#f39c12",
                "#f9e79f",
                "#1e8449",
                "#81c784",
                "#d5f5e3",
                "#1a5276",
                "#64b5f6",
                "#d6eaf8",
                "#6c3483",
                "#bc98cc",
                "#e8d5f5",
                "#867fa3",
                "#b5acdd",
                "#eed2d8",
                "#000000",
                "#707070",
                "#ffffff",
            ];
            let currentColor = "#d17a8c";

            const swatchGrid = document.getElementById("swatch-grid");
            swatches.forEach((color) => {
                const s = document.createElement("div");
                s.className = "swatch";
                s.style.backgroundColor = color;
                s.title = color;
                if (color === currentColor) s.classList.add("active");
                s.addEventListener("click", () => {
                    setColor(color);
                    rSlider.value = parseInt(color.slice(1, 3), 16);
                    rVal.textContent = rSlider.value;
                    gSlider.value = parseInt(color.slice(3, 5), 16);
                    gVal.textContent = gSlider.value;
                    bSlider.value = parseInt(color.slice(5, 7), 16);
                    bVal.textContent = bSlider.value;
                });
                swatchGrid.appendChild(s);
            });

            function setColor(hex) {
                currentColor = hex;
                document.getElementById("colour-preview").style.backgroundColor = hex;
                document.getElementById("colour-preview-rgb").style.backgroundColor = hex;
                document
                    .querySelectorAll(".swatch")
                    .forEach((s) => s.classList.toggle("active", s.style.backgroundColor === hexToRgb(hex)));
            }
            function hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                return `rgb(${r}, ${g}, ${b})`;
            }

            const rSlider = document.getElementById("r-slider"),
                gSlider = document.getElementById("g-slider"),
                bSlider = document.getElementById("b-slider");
            const rVal = document.getElementById("r-val"),
                gVal = document.getElementById("g-val"),
                bVal = document.getElementById("b-val");

            function updateColorFromSliders() {
                const r = parseInt(rSlider.value),
                    g = parseInt(gSlider.value),
                    b = parseInt(bSlider.value);
                rVal.textContent = r;
                gVal.textContent = g;
                bVal.textContent = b;
                setColor("#" + [r, g, b].map((v) => v.toString(16).padStart(2, "0")).join(""));
            }
            rSlider.addEventListener("input", updateColorFromSliders);
            gSlider.addEventListener("input", updateColorFromSliders);
            bSlider.addEventListener("input", updateColorFromSliders);
            setColor(currentColor);

            const canvas = document.getElementById("draw-canvas"),
                ctx = canvas.getContext("2d");
            const sizeSlider = document.getElementById("draw-size"),
                eraserBtn = document.getElementById("draw-eraser");
            const clearBtn = document.getElementById("draw-clear"),
                submitBtn = document.getElementById("draw-submit");
            const statusEl = document.getElementById("draw-status"),
                authorEl = document.getElementById("draw-author");
            let drawing = false,
                erasing = false;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width,
                    scaleY = canvas.height / rect.height;
                const src = e.touches ? e.touches[0] : e;
                return {
                    x: (src.clientX - rect.left) * scaleX,
                    y: (src.clientY - rect.top) * scaleY,
                };
            };

            canvas.addEventListener("mousedown", (e) => {
                e.stopPropagation();
                drawing = true;
                ctx.beginPath();
                const p = getPos(e);
                ctx.moveTo(p.x, p.y);
            });
            function handleDrawing(p) {
                if (!drawing) return;

                ctx.lineWidth = sizeSlider.value;
                ctx.lineCap = "round";

                if (erasing) {
                    ctx.globalCompositeOperation = "destination-out";
                    ctx.strokeStyle = "rgba(0,0,0,1)"; // Must be opaque to "cut" through
                } else {
                    ctx.globalCompositeOperation = "source-over";
                    ctx.strokeStyle = currentColor;
                }

                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
            }

            canvas.addEventListener("mousemove", (e) => {
                handleDrawing(getPos(e));
            });

            canvas.addEventListener(
                "touchmove",
                (e) => {
                    e.preventDefault();
                    handleDrawing(getPos(e));
                },
                { passive: false }
            );

            canvas.addEventListener("mouseup", () => (drawing = false));
            canvas.addEventListener("mouseleave", () => (drawing = false));
            canvas.addEventListener(
                "touchstart",
                (e) => {
                    e.preventDefault();
                    drawing = true;
                    ctx.beginPath();
                    const p = getPos(e);
                    ctx.moveTo(p.x, p.y);
                },
                { passive: false }
            );
            canvas.addEventListener("touchend", () => {
                drawing = false;
            });

            eraserBtn.addEventListener("click", () => {
                erasing = !erasing;
                eraserBtn.textContent = erasing ? "Pen ✏️" : "Eraser";
                canvas.style.cursor = erasing ? "cell" : "url(cursorpen.png) 16 16, crosshair";
            });
            clearBtn.addEventListener("click", () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            });

            submitBtn.addEventListener("click", async () => {
                statusEl.textContent = "Saving...";
                submitBtn.disabled = true;
                const author = authorEl.value.trim() || "Anonymous",
                    timestamp = Date.now();
                const filename = `drawing-${timestamp}.png`,
                    base64 = canvas.toDataURL("image/png").split(",");
                try {
                    //const res = await fetch("https://drawbox.celes-meh.workers.dev", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({
                            type: "submit",
                            filename,
                            base64,
                            author,
                        }),
                    });
                    if (res.ok) {
                        statusEl.textContent = "✓ Saved! Gallery updated.";
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                        authorEl.value = "";
                        loadDrawingsGallery();
                    } else {
                        const err = await res.json();
                        statusEl.textContent = `Error: ${err.message}`;
                    }
                } catch (e) {
                    statusEl.textContent = "Network error — try again.";
                }
                submitBtn.disabled = false;
            });
            // ===== D-PAD GALLERY SCROLL =====
            const galleryScreen = document.getElementById("drawings-grid");
            const scrollAmount = 150;

            document.querySelector(".ds-dpad-up").addEventListener("click", () => {
                galleryScreen.scrollBy({
                    top: -scrollAmount,
                    behavior: "smooth",
                });
            });
            document.querySelector(".ds-dpad-down").addEventListener("click", () => {
                galleryScreen.scrollBy({
                    top: scrollAmount,
                    behavior: "smooth",
                });
            });
            document.querySelector(".ds-dpad-left").addEventListener("click", () => {
                galleryScreen.scrollBy({
                    left: -scrollAmount,
                    behavior: "smooth",
                });
            });
            document.querySelector(".ds-dpad-right").addEventListener("click", () => {
                galleryScreen.scrollBy({
                    left: scrollAmount,
                    behavior: "smooth",
                });
            });

            async function loadDrawingsGallery() {
                const grid = document.getElementById("drawings-grid");
                grid.innerHTML = "<p>Loading...</p>";
                try {
                    const res = await fetch("https://drawbox.celes-meh.workers.dev", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                        },
                        body: JSON.stringify({ type: "list" }),
                    });
                    const files = await res.json();
                    const drawings = files
                        .filter((f) => f.name.endsWith(".png"))
                        .sort((a, b) => b.name.localeCompare(a.name));
                    if (!drawings.length) {
                        grid.innerHTML = "<p>No drawings yet — be the first!</p>";
                        return;
                    }
                    grid.innerHTML = "";
                    drawings.forEach((file) => {
                        const wrapper = document.createElement("div");
                        wrapper.className = "gallery-item";
                        const img = document.createElement("img");
                        img.src = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/drawings/${file.name}`;
                        img.alt = file.name;
                        img.addEventListener("click", () => openImageWindow(img.src, img.alt));
                        const star = document.createElement("button");
                        star.textContent = "✏️";
                        star.className = "gallery-star";
                        star.title = "Add to Hall of Fame";
                        star.addEventListener("click", (e) => {
                            e.stopPropagation();
                            addToHallOfFame(img.src);
                        });
                        wrapper.appendChild(img);
                        wrapper.appendChild(star);
                        grid.appendChild(wrapper);
                    });
                } catch (e) {
                    grid.innerHTML = "<p>Could not load drawings.</p>";
                }
            }

            loadDrawingsGallery();
